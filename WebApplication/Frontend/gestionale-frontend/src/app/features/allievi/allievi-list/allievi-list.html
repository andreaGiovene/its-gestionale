<div class="allievi-container">
  <div class="header">
    <h1>Allievi</h1>
    <button class="btn btn-primary" (click)="createNew()">Nuovo Allievo</button>
  </div>

  <ng-container *ngIf="isLoading">
    <p class="loading">Caricamento in corso...</p>
  </ng-container>

  <ng-container *ngIf="error && !isLoading">
    <div class="error-message alert alert-danger">
      {{ error }}
    </div>
  </ng-container>

  <ng-container *ngIf="!isLoading && !error">
    <ng-container *ngIf="allievi.length > 0; else emptyState">
      <table class="table table-hover">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Cognome</th>
            <th>Codice Fiscale</th>
            <th>Corso</th>
            <th>Data Nascita</th>
            <th>Azioni</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let allievo of allievi" (click)="viewDetail(allievo.id)" class="cursor-pointer">
            <td>{{ allievo.id }}</td>
            <td>{{ allievo.nome }}</td>
            <td>{{ allievo.cognome }}</td>
            <td>{{ allievo.codiceFiscale || '-' }}</td>
            <td>{{ allievo.corsoNome || '-' }}</td>
            <td>{{ allievo.dataDiNascita || '-' }}</td>
            <td>
              <button class="btn btn-sm btn-info" (click)="viewDetail(allievo.id)">Dettagli</button>
              <button class="btn btn-sm btn-danger" (click)="delete(allievo.id, $event)">Elimina</button>
            </td>
          </tr>
        </tbody>
      </table>
    </ng-container>

    <ng-template #emptyState>
      <div class="empty-state">
        <p>Nessun allievo disponibile.</p>
        <button class="btn btn-primary" (click)="createNew()">Crea il primo allievo</button>
      </div>
    </ng-template>
  </ng-container>
</div>
