<div class="allievo-detail-container">
  <div class="header">
    <button class="btn btn-outline-secondary" (click)="cancel()">← Indietro</button>
    <h1>{{ isNew ? 'Nuovo Allievo' : 'Dettagli Allievo' }}</h1>
    <span></span>
  </div>

  <ng-container *ngIf="isLoading">
    <p class="loading">Caricamento in corso...</p>
  </ng-container>

  <ng-container *ngIf="error && !isLoading">
    <div class="error-message alert alert-danger">
      {{ error }}
    </div>
  </ng-container>

  <ng-container *ngIf="!isLoading">
    <form [formGroup]="form" class="form-container">
      <div class="form-row">
        <div class="form-group col-md-6">
          <label for="nome">Nome *</label>
          <input type="text" id="nome" class="form-control" formControlName="nome" />
          <small *ngIf="form.get('nome')?.errors?.['required']">Il nome è obbligatorio</small>
        </div>

        <div class="form-group col-md-6">
          <label for="cognome">Cognome *</label>
          <input type="text" id="cognome" class="form-control" formControlName="cognome" />
          <small *ngIf="form.get('cognome')?.errors?.['required']">Il cognome è obbligatorio</small>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group col-md-6">
          <label for="codiceFiscale">Codice Fiscale</label>
          <input
            type="text"
            id="codiceFiscale"
            class="form-control"
            formControlName="codiceFiscale"
            placeholder="Inserisci codice fiscale"
          />
        </div>

        <div class="form-group col-md-6">
          <label for="dataDiNascita">Data di nascita</label>
          <input type="date" id="dataDiNascita" class="form-control" formControlName="dataDiNascita" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group col-md-12">
          <label for="corsoId">Corso</label>
          <select id="corsoId" class="form-control" formControlName="corsoId">
            <option value="">-- Nessun corso associato --</option>
            <option *ngFor="let corso of corsi" [value]="corso.id">{{ corso.nome }}</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group col-md-12">
          <label for="note">Note</label>
          <textarea
            id="note"
            rows="4"
            class="form-control"
            formControlName="note"
            placeholder="Inserisci note aggiuntive"
          ></textarea>
        </div>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="isSubmitting">
          Annulla
        </button>
        <button type="button" class="btn btn-primary" (click)="save()" [disabled]="form.invalid || isSubmitting">
          {{ isSubmitting ? 'Salvataggio...' : 'Salva' }}
        </button>
      </div>
    </form>
  </ng-container>
</div>
