<!-- Lista corsi con filtri client-side, stato di caricamento e gestione empty state. -->
<div class="corsi-container">
  <div class="header">
    <h1>Corsi</h1>
    <button class="btn btn-primary" (click)="createNew()">Nuovo Corso</button>
  </div>

  <ng-container *ngIf="isLoading">
    <p class="loading">Caricamento in corso...</p>
  </ng-container>

  <ng-container *ngIf="error && !isLoading">
    <div class="error-message alert alert-danger">
      {{ error }}
    </div>
  </ng-container>

  <ng-container *ngIf="!isLoading && !error">
    <div class="filters-panel">
      <div class="filters-grid">
        <div class="filter-item">
          <label for="filterNome">Nome corso</label>
          <select
            id="filterNome"
            class="form-control"
            [(ngModel)]="selectedNomeCorso"
            (ngModelChange)="applyFilters()"
          >
            <option value="">Tutti i corsi</option>
            <option *ngFor="let nome of nomiCorsiDisponibili" [value]="nome">{{ nome }}</option>
          </select>
        </div>

        <div class="filter-item">
          <label for="searchNome">Ricerca testuale nome</label>
          <div class="search-row">
            <input
              id="searchNome"
              type="text"
              class="form-control"
              placeholder="Cerca nel nome corso"
              [(ngModel)]="searchTerm"
              (keyup.enter)="applyFilters()"
            />
            <button type="button" class="btn btn-primary btn-search" (click)="applyFilters()">
              Cerca
            </button>
          </div>
        </div>

        <div class="filter-item">
          <label for="filterStato">Stato</label>
          <select
            id="filterStato"
            class="form-control"
            [(ngModel)]="selectedStato"
            (ngModelChange)="applyFilters()"
          >
            <option value="">Tutti gli stati</option>
            <option *ngFor="let stato of statiDisponibili" [value]="stato">{{ stato }}</option>
          </select>
        </div>

        <div class="filter-item">
          <label for="filterAnno">Anno accademico</label>
          <select
            id="filterAnno"
            class="form-control"
            [(ngModel)]="selectedAnnoAccademico"
            (ngModelChange)="applyFilters()"
          >
            <option value="">Tutti gli anni</option>
            <option *ngFor="let anno of anniDisponibili" [value]="anno">{{ anno }}</option>
          </select>
        </div>

        <div class="filter-actions">
          <button class="btn btn-secondary" (click)="resetFilters()">Reset filtri</button>
        </div>
      </div>
    </div>

    <ng-container *ngIf="filteredCorsi.length > 0; else emptyState">
      <table class="table table-hover">
        <thead>
          <tr>
            <th>ID</th>
            <th>
              <button type="button" mat-button class="sort-button" (click)="toggleNomeSort()">
                <span>Nome</span>
                <mat-icon aria-hidden="true">{{ nomeSortDirection === 'asc' ? 'south' : 'north' }}</mat-icon>
              </button>
            </th>
            <th>
              <button type="button" mat-button class="sort-button" (click)="toggleAnnoSort()">
                <span>Anno Accademico</span>
                <mat-icon aria-hidden="true">{{ annoSortDirection === 'asc' ? 'south' : 'north' }}</mat-icon>
              </button>
            </th>
            <th>Stato</th>
            <th>Allievi</th>
            <th>Azioni</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let corso of filteredCorsi" (click)="viewDetail(corso.id)" class="cursor-pointer">
            <td>{{ corso.id }}</td>
            <td>{{ corso.nome }}</td>
            <td>{{ corso.annoAccademico }}</td>
            <td>
              <span class="badge" [ngClass]="{'badge-success': corso.stato === 'ATTIVO', 'badge-secondary': corso.stato !== 'ATTIVO'}">
                {{ corso.stato }}
              </span>
            </td>
            <td>{{ corso.allieviCount || 0 }}</td>
            <td>
              <button class="btn btn-sm btn-info" (click)="viewDetail(corso.id)">Dettagli</button>
              <button class="btn btn-sm btn-danger" (click)="delete(corso.id, $event)">Elimina</button>
            </td>
          </tr>
        </tbody>
      </table>
    </ng-container>

    <ng-template #emptyState>
      <div class="empty-state">
        <p *ngIf="allCorsi.length === 0">Nessun corso disponibile.</p>
        <p *ngIf="allCorsi.length > 0">Nessun corso corrisponde ai filtri selezionati.</p>
        <button *ngIf="allCorsi.length > 0" class="btn btn-secondary" (click)="resetFilters()">
          Reset filtri
        </button>
        <button *ngIf="allCorsi.length === 0" class="btn btn-primary" (click)="createNew()">
          Crea il primo corso
        </button>
      </div>
    </ng-template>
  </ng-container>
</div>
