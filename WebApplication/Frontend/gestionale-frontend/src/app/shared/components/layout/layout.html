<mat-sidenav-container class="sidenav-container">

  <!-- ─── SIDEBAR ─────────────────────────────── -->
  <mat-sidenav [mode]="isMobile ? 'over' : 'side'" [opened]="!isMobile" class="sidenav">
    <app-sidebar [items]="menuItems" (navigate)="onMenuNavigate()" />

  </mat-sidenav>

  <!-- ─── CONTENUTO PRINCIPALE ─────────────────── -->
  <mat-sidenav-content class="main-content">

    <app-header [showMenuButton]="isMobile" (menuToggle)="toggleSidenav()" (logout)="onLogout()" />
    <app-breadcrumb />

    <!-- Qui Angular inserisce il componente della route corrente -->
    <div class="content-area">
      <router-outlet />
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
