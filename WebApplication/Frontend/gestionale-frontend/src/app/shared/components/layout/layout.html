<mat-sidenav-container class="sidenav-container">

  <!-- Sidebar laterale: resta fissa su desktop e diventa sovrapposta su mobile. -->
  <mat-sidenav [mode]="isMobile ? 'over' : 'side'" [opened]="!isMobile" class="sidenav">
    <app-sidebar [items]="menuItems" (navigate)="onMenuNavigate()" />

  </mat-sidenav>

  <!-- Area principale: header, breadcrumb e contenuto della route attiva. -->
  <mat-sidenav-content class="main-content">

    <app-header [showMenuButton]="isMobile" (menuToggle)="toggleSidenav()" (logout)="onLogout()" />
    <app-breadcrumb />

    <!-- Angular inserisce qui il componente associato alla route corrente. -->
    <div class="content-area">
      <router-outlet />
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
