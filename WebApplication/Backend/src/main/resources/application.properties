# Nome dell'applicazione
spring.application.name=gestionale

# Profilo di default in sviluppo
spring.profiles.default=dev

# CORS globale condiviso (le origini sono definite per profilo)
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,Accept,Origin,X-Requested-With
app.cors.allow-credentials=true
app.cors.max-age=3600

# DATABASE
spring.datasource.url=jdbc:postgresql://localhost:5432/db_its_stage
spring.datasource.username=postgres
spring.datasource.password=postgres

# Configurazione per l'invio di email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=maria.cernat@edu-its.it
spring.mail.password=fzeukjvzxcygjetp

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server
server.port=8080
