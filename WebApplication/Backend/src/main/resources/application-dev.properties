# Database locale sviluppo
spring.datasource.url=jdbc:postgresql://localhost:5432/db_its_stage
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT in sviluppo
app.jwt.secret=dev-secret-change-me-dev-secret-change-me-dev-secret
app.jwt.expiration-minutes=480

# CORS in sviluppo (frontend Angular locale)
app.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200