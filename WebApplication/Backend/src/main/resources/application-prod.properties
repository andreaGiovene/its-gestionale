# Database produzione (override tramite variabili ambiente)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/db_its_stage}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging più sobrio in produzione
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=WARN

# CORS in produzione (impostare dominio frontend reale)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://app.example.com}

# JWT in produzione
app.jwt.secret=${APP_JWT_SECRET:change-me-in-production-change-me-in-production}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:120}